# Alembic 配置 (psynote server-py)
#
# 关键设计:
#   - sqlalchemy.url 由 alembic/env.py 从 app.core.config.Settings 读取,
#     不在 alembic.ini 写死 (避免泄露 DB 密码到仓库)
#   - timezone 用 UTC, 跟 organizations.created_at 等所有 timestamptz 列一致
#   - file_template: 0001_<slug>.py 风格 (4 位数字 + 描述性 slug, 与 Drizzle migration
#     "001-<slug>.ts" 风格类似)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# Migration 文件命名: 0001_<slug>.py
file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url 留空 — 由 env.py 注入
sqlalchemy.url =


[post_write_hooks]
# autogenerate 后自动 ruff format
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
